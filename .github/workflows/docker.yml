name: Publish Docker images

# Triggers:
#   - push to main:   rebuild and publish :latest (for Dockerfile / workflow changes here)
#   - schedule:       nightly refresh of :latest / :main (base-image security fixes)
#                     and a fresh :dev build of -cli images from chapkit's main branch.
#   - workflow_dispatch: manual trigger with a specific chapkit version
#                        from PyPI (e.g. 0.23.0). Defaults to the pinned
#                        release below. Only affects -cli images. Also
#                        triggers a :dev rebuild.
#   - repository_dispatch (event=chapkit-release): a chapkit release fires
#     this to rebuild the -cli images against the released version.
#
# Tag scheme:
#   - :latest / :main / :sha-* / :<semver>  -- chapkit installed from PyPI
#                                              (release version pinned in env below)
#   - :dev                                  -- chapkit installed from the main branch
#                                              of github.com/dhis2-chap/chapkit
#                                              (only on -cli images; base images
#                                              don't have chapkit so :dev is N/A)
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'chapkit-py.Dockerfile'
      - 'chapkit-r.Dockerfile'
      - 'chapkit-r-tidyverse.Dockerfile'
      - 'chapkit-r-inla.Dockerfile'
      - '.github/workflows/docker.yml'
  schedule:
    - cron: '17 4 * * *'  # nightly at 04:17 UTC — refreshes :latest / :main
                          # and stamps :dev so consumers can pin to nightly.
  workflow_dispatch:
    inputs:
      chapkit_version:
        description: 'chapkit PyPI version to install in -cli images (e.g. 0.23.0)'
        required: false
        default: ''
  repository_dispatch:
    types: [chapkit-release]

permissions:
  contents: read
  packages: write

env:
  # Resolve the chapkit version for this run. workflow_dispatch input
  # wins, otherwise repository_dispatch client_payload.ref (which may
  # come in as 'v0.23.0' or '0.23.0' — the Dockerfile strips a leading
  # 'v'), otherwise the currently-pinned release. Only consumed by the
  # -cli matrix entries; base entries do not install chapkit.
  CHAPKIT_VERSION: >-
    ${{ github.event.inputs.chapkit_version
        || github.event.client_payload.ref
        || '0.23.0' }}

jobs:
  # Resolve a tag downstream phases can FROM. We use the short SHA
  # (sha-<7-char>) so the reference is unique per commit and works for
  # both PR and main builds. metadata-action emits this tag for every
  # event type.
  resolve-from-tag:
    name: resolve-from-tag
    runs-on: ubuntu-latest
    outputs:
      from_tag: ${{ steps.tag.outputs.from_tag }}
    steps:
      - id: tag
        run: echo "from_tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

  # Phase 1: leaf images with no FROM dependency on other chapkit-images
  # entries. Build chapkit-py and chapkit-r in parallel, multi-arch.
  build-leaf:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [resolve-from-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: chapkit-py.Dockerfile
            image: chapkit-py
            target: runtime
            platforms: linux/amd64,linux/arm64
          - dockerfile: chapkit-py.Dockerfile
            image: chapkit-py-cli
            target: bundled
            platforms: linux/amd64,linux/arm64
          - dockerfile: chapkit-r.Dockerfile
            image: chapkit-r
            target: runtime
            platforms: linux/amd64,linux/arm64
          - dockerfile: chapkit-r.Dockerfile
            image: chapkit-r-cli
            target: bundled
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        if: contains(matrix.platforms, 'arm64')
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dhis2-chap/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          # Push on PRs too: downstream phases FROM the just-pushed
          # chapkit-r:sha-* tag and need it available in the registry.
          push: true
          platforms: ${{ matrix.platforms }}
          build-args: |
            CHAPKIT_VERSION=${{ env.CHAPKIT_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache,mode=max,image-manifest=true

  # Phase 2: chapkit-r-tidyverse FROM chapkit-r:sha-*. Multi-arch.
  build-r-tidyverse:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [resolve-from-tag, build-leaf]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: chapkit-r-tidyverse
            target: runtime
          - image: chapkit-r-tidyverse-cli
            target: bundled
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dhis2-chap/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: chapkit-r-tidyverse.Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            CHAPKIT_R_IMAGE=ghcr.io/dhis2-chap/chapkit-r:${{ needs.resolve-from-tag.outputs.from_tag }}
            CHAPKIT_VERSION=${{ env.CHAPKIT_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache,mode=max,image-manifest=true

  # Phase 3: chapkit-r-inla FROM chapkit-r-tidyverse:sha-*. amd64 only.
  build-r-inla:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [resolve-from-tag, build-r-tidyverse]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: chapkit-r-inla
            target: runtime
          - image: chapkit-r-inla-cli
            target: bundled
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dhis2-chap/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: chapkit-r-inla.Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64
          build-args: |
            CHAPKIT_R_TIDYVERSE_IMAGE=ghcr.io/dhis2-chap/chapkit-r-tidyverse:${{ needs.resolve-from-tag.outputs.from_tag }}
            CHAPKIT_VERSION=${{ env.CHAPKIT_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache,mode=max,image-manifest=true

  # Aggregator job so existing `needs: [build]` references still work.
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [build-leaf, build-r-tidyverse, build-r-inla]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.build-leaf.result }}" != "success" ] || \
             [ "${{ needs.build-r-tidyverse.result }}" != "success" ] || \
             [ "${{ needs.build-r-inla.result }}" != "success" ]; then
            echo "One or more build phases failed"
            exit 1
          fi

  build-dev:
    # Nightly :dev build of -cli images against chapkit's main branch.
    # Only runs on schedule and workflow_dispatch. Base images are not
    # rebuilt here — they don't carry chapkit, so :dev would be a
    # duplicate of :latest.
    #
    # CHAPKIT_GIT_REF=main means uv installs from a literal `@main` ref.
    # BuildKit's layer cache is keyed on the RUN command text, so the
    # bundled-stage cache may serve a stale chapkit until something
    # earlier in the build invalidates the layer. In practice, nightly
    # base-image layer churn handles this often enough.
    name: ${{ matrix.image }}:dev
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: chapkit-py.Dockerfile
            image: chapkit-py-cli
            platforms: linux/amd64,linux/arm64
            extra_build_args: ""
          - dockerfile: chapkit-r.Dockerfile
            image: chapkit-r-cli
            platforms: linux/amd64,linux/arm64
            extra_build_args: ""
          - dockerfile: chapkit-r-tidyverse.Dockerfile
            image: chapkit-r-tidyverse-cli
            platforms: linux/amd64,linux/arm64
            extra_build_args: "CHAPKIT_R_IMAGE=ghcr.io/dhis2-chap/chapkit-r:dev"
          - dockerfile: chapkit-r-inla.Dockerfile
            image: chapkit-r-inla-cli
            platforms: linux/amd64
            extra_build_args: "CHAPKIT_R_TIDYVERSE_IMAGE=ghcr.io/dhis2-chap/chapkit-r-tidyverse:dev"
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        if: contains(matrix.platforms, 'arm64')
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: bundled
          push: true
          platforms: ${{ matrix.platforms }}
          build-args: |
            CHAPKIT_GIT_REF=main
            ${{ matrix.extra_build_args }}
          tags: ghcr.io/dhis2-chap/${{ matrix.image }}:dev
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache,mode=max,image-manifest=true

  smoke:
    name: smoke
    needs: [build]
    # Only run after images are actually pushed (not on PR builds where
    # push is skipped). Limits to refs/heads/main so we pull :main — tag
    # builds use a different tag scheme and can gain their own smoke job
    # once the semver tagging is fixed up.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Base images: chapkit is intentionally absent. Verify uv is on
      # PATH so downstream `uv sync` works.
      - name: Smoke chapkit-py
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-py:main uv --version

      - name: Smoke chapkit-r
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r:main uv --version

      - name: Smoke chapkit-r-tidyverse
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-tidyverse:main uv --version

      - name: Smoke chapkit-r-tidyverse (tidyverse loads)
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-tidyverse:main R -q -e "library(tidyverse); library(fable); library(tsibble); cat('OK\n')"

      - name: Smoke chapkit-r-inla
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla:main uv --version

      # -cli images: chapkit is pre-installed, so `chapkit --help` works.
      - name: Smoke chapkit-py-cli
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-py-cli:main chapkit --help

      - name: Smoke chapkit-r-cli
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-cli:main chapkit --help

      - name: Smoke chapkit-r-tidyverse-cli
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-tidyverse-cli:main chapkit --help

      - name: Smoke chapkit-r-inla-cli (CLI)
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla-cli:main chapkit --help

      - name: Smoke chapkit-r-inla-cli (INLA loads)
        run: |
          docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla-cli:main \
            R -q -e "library(INLA); cat('INLA', as.character(packageVersion('INLA')), '\n')"

  smoke-dev:
    name: smoke-dev
    needs: [build-dev]
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke chapkit-py-cli :dev
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-py-cli:dev chapkit --help

      - name: Smoke chapkit-r-cli :dev
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-cli:dev chapkit --help

      - name: Smoke chapkit-r-tidyverse-cli :dev
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-tidyverse-cli:dev chapkit --help

      - name: Smoke chapkit-r-inla-cli :dev (CLI)
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla-cli:dev chapkit --help

      - name: Smoke chapkit-r-inla-cli :dev (INLA loads)
        run: |
          docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla-cli:dev \
            R -q -e "library(INLA); cat('INLA', as.character(packageVersion('INLA')), '\n')"
