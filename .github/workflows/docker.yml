name: Publish Docker images

# Triggers:
#   - push to main:   rebuild and publish :latest (for Dockerfile / workflow changes here)
#   - schedule:       weekly refresh so pinned base images pull in security fixes
#   - workflow_dispatch: manual trigger with a specific chapkit ref
#                        (branch / tag / commit SHA). Defaults to "main".
#   - repository_dispatch (event=chapkit-release): a chapkit release fires
#     this to rebuild the images against the released version.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'chapkit-py.Dockerfile'
      - 'chapkit-r.Dockerfile'
      - 'chapkit-r-inla.Dockerfile'
      - '.github/workflows/docker.yml'
  schedule:
    - cron: '17 4 * * 1'  # every Monday 04:17 UTC
  workflow_dispatch:
    inputs:
      chapkit_ref:
        description: 'chapkit git ref to install (branch, tag, or SHA)'
        required: false
        default: 'main'
  repository_dispatch:
    types: [chapkit-release]

permissions:
  contents: read
  packages: write

env:
  # Resolve the chapkit ref for this run. workflow_dispatch input wins,
  # otherwise repository_dispatch client_payload.ref, otherwise the
  # currently-targeted chapkit release tag.
  CHAPKIT_REF: >-
    ${{ github.event.inputs.chapkit_ref
        || github.event.client_payload.ref
        || 'v0.23.0' }}

jobs:
  build-py:
    name: chapkit-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dhis2-chap/chapkit-py
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: chapkit-py.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            CHAPKIT_REF=${{ env.CHAPKIT_REF }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/chapkit-py:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/chapkit-py:buildcache,mode=max,image-manifest=true

  build-r:
    name: chapkit-r
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dhis2-chap/chapkit-r
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: chapkit-r.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            CHAPKIT_REF=${{ env.CHAPKIT_REF }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/chapkit-r:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/chapkit-r:buildcache,mode=max,image-manifest=true

  build-r-inla:
    name: chapkit-r-inla
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dhis2-chap/chapkit-r-inla
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: chapkit-r-inla.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          build-args: |
            CHAPKIT_REF=${{ env.CHAPKIT_REF }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/chapkit-r-inla:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/chapkit-r-inla:buildcache,mode=max,image-manifest=true

  smoke:
    name: smoke
    needs: [build-py, build-r, build-r-inla]
    # Only run after images are actually pushed (not on PR builds where
    # push is skipped). Limits to refs/heads/main so we pull :main — tag
    # builds use a different tag scheme and can gain their own smoke job
    # once the semver tagging is fixed up.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke chapkit-py
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-py:main chapkit --help

      - name: Smoke chapkit-r
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r:main chapkit --help

      - name: Smoke chapkit-r-inla (CLI)
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla:main chapkit --help

      - name: Smoke chapkit-r-inla (INLA loads)
        run: |
          docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla:main \
            R -q -e "library(INLA); cat('INLA', as.character(packageVersion('INLA')), '\n')"
