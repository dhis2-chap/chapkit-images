name: Publish Docker images

# Triggers:
#   - push to main:   rebuild and publish :latest (for Dockerfile / workflow changes here)
#   - schedule:       weekly refresh so pinned base images pull in security fixes
#   - workflow_dispatch: manual trigger with a specific chapkit version
#                        from PyPI (e.g. 0.23.0). Defaults to the pinned
#                        release below. Only affects -cli images.
#   - repository_dispatch (event=chapkit-release): a chapkit release fires
#     this to rebuild the -cli images against the released version.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'chapkit-py.Dockerfile'
      - 'chapkit-r.Dockerfile'
      - 'chapkit-r-inla.Dockerfile'
      - '.github/workflows/docker.yml'
  schedule:
    - cron: '17 4 * * *'  # nightly at 04:17 UTC — refreshes :latest / :main
                          # and stamps :dev so consumers can pin to nightly.
  workflow_dispatch:
    inputs:
      chapkit_version:
        description: 'chapkit PyPI version to install in -cli images (e.g. 0.23.0)'
        required: false
        default: ''
  repository_dispatch:
    types: [chapkit-release]

permissions:
  contents: read
  packages: write

env:
  # Resolve the chapkit version for this run. workflow_dispatch input
  # wins, otherwise repository_dispatch client_payload.ref (which may
  # come in as 'v0.23.0' or '0.23.0' — the Dockerfile strips a leading
  # 'v'), otherwise the currently-pinned release. Only consumed by the
  # -cli matrix entries; base entries do not install chapkit.
  CHAPKIT_VERSION: >-
    ${{ github.event.inputs.chapkit_version
        || github.event.client_payload.ref
        || '0.23.0' }}

jobs:
  build:
    # Six parallel matrix entries: {py, r, r-inla} x {base, cli}.
    # Base images contain Python/R + uv only and are intended as a FROM
    # base for scaffolded chapkit services. -cli images add a pinned
    # chapkit from PyPI for invoking the chapkit CLI directly.
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: chapkit-py.Dockerfile
            image: chapkit-py
            target: runtime
            platforms: linux/amd64,linux/arm64
          - dockerfile: chapkit-py.Dockerfile
            image: chapkit-py-cli
            target: bundled
            platforms: linux/amd64,linux/arm64
          - dockerfile: chapkit-r.Dockerfile
            image: chapkit-r
            target: runtime
            platforms: linux/amd64,linux/arm64
          - dockerfile: chapkit-r.Dockerfile
            image: chapkit-r-cli
            target: bundled
            platforms: linux/amd64,linux/arm64
          - dockerfile: chapkit-r-inla.Dockerfile
            image: chapkit-r-inla
            target: runtime
            platforms: linux/amd64
          - dockerfile: chapkit-r-inla.Dockerfile
            image: chapkit-r-inla-cli
            target: bundled
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        if: contains(matrix.platforms, 'arm64')
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/dhis2-chap/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ matrix.platforms }}
          # CHAPKIT_VERSION is only consumed by the bundled stage; the
          # runtime stage doesn't reference the ARG so passing it here
          # is a no-op for base entries.
          build-args: |
            CHAPKIT_VERSION=${{ env.CHAPKIT_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/dhis2-chap/${{ matrix.image }}:buildcache,mode=max,image-manifest=true

  smoke:
    name: smoke
    needs: [build]
    # Only run after images are actually pushed (not on PR builds where
    # push is skipped). Limits to refs/heads/main so we pull :main — tag
    # builds use a different tag scheme and can gain their own smoke job
    # once the semver tagging is fixed up.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Base images: chapkit is intentionally absent. Verify uv is on
      # PATH so downstream `uv sync` works.
      - name: Smoke chapkit-py
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-py:main uv --version

      - name: Smoke chapkit-r
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r:main uv --version

      - name: Smoke chapkit-r-inla
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla:main uv --version

      # -cli images: chapkit is pre-installed, so `chapkit --help` works.
      - name: Smoke chapkit-py-cli
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-py-cli:main chapkit --help

      - name: Smoke chapkit-r-cli
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-cli:main chapkit --help

      - name: Smoke chapkit-r-inla-cli (CLI)
        run: docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla-cli:main chapkit --help

      - name: Smoke chapkit-r-inla-cli (INLA loads)
        run: |
          docker run --rm ghcr.io/dhis2-chap/chapkit-r-inla-cli:main \
            R -q -e "library(INLA); cat('INLA', as.character(packageVersion('INLA')), '\n')"
